services:
  api:
    build: .
    image: agentic-rag-evals:local
    ports:
      - "8000:8000"
    environment:
      # Runs fully locally (local embeddings + FakeLLM) with no key.
      # Provide a key here to enable hosted generation + the LLM-as-judge:
      #   OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_TRACING: "none"
      RAG_EMBEDDING_BACKEND: "local"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
